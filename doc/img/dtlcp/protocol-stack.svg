<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="32" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">DTLCP 协议栈分层结构</text>

  <!-- 应用层 -->
  <rect x="100" y="60" width="760" height="60" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="97" text-anchor="middle" fill="#7c3aed" font-size="16" font-weight="600">应用数据 (Application Data)</text>

  <line x1="480" y1="120" x2="480" y2="138" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 握手协议族 -->
  <rect x="100" y="143" width="760" height="160" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="170" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="600">握手协议族 (Handshake Protocol Family)</text>
  <rect x="130" y="188" width="220" height="60" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="240" y="224" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">握手协议</text>
  <rect x="370" y="188" width="220" height="60" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="480" y="218" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">密码规格变更协议</text>
  <text x="480" y="236" text-anchor="middle" fill="#6b7280" font-size="11">Change Cipher Spec</text>
  <rect x="610" y="188" width="220" height="60" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="720" y="224" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">报警协议 (Alert)</text>
  <text x="480" y="278" text-anchor="middle" fill="#6b7280" font-size="11">← 消息分片 · 重传 · Cookie · 重放保护 →</text>

  <line x1="480" y1="303" x2="480" y2="318" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 记录层 -->
  <rect x="100" y="323" width="760" height="140" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="350" text-anchor="middle" fill="#15803d" font-size="14" font-weight="600">记录层协议 (Record Layer)</text>
  <rect x="130" y="368" width="220" height="60" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="240" y="399" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">分片</text>
  <text x="240" y="416" text-anchor="middle" fill="#6b7280" font-size="11">≤ PMTU</text>
  <rect x="370" y="368" width="220" height="60" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="480" y="399" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">压缩</text>
  <text x="480" y="416" text-anchor="middle" fill="#6b7280" font-size="11">可选</text>
  <rect x="610" y="368" width="220" height="60" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="720" y="399" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">加密 / MAC</text>
  <text x="720" y="416" text-anchor="middle" fill="#6b7280" font-size="11">SM4-GCM / SM4-CBC</text>

  <line x1="480" y1="463" x2="480" y2="478" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- UDP -->
  <rect x="100" y="483" width="760" height="60" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="520" text-anchor="middle" fill="#c2410c" font-size="16" font-weight="600">UDP (User Datagram Protocol)</text>

  <!-- Legend -->
  <g transform="translate(30, 568)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="18" y="11" fill="#6b7280" font-size="11">应用层</text>
    <rect x="80" y="0" width="12" height="12" rx="2" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="98" y="11" fill="#6b7280" font-size="11">握手层</text>
    <rect x="160" y="0" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="178" y="11" fill="#6b7280" font-size="11">记录层</text>
    <rect x="240" y="0" width="12" height="12" rx="2" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="258" y="11" fill="#6b7280" font-size="11">传输层</text>
    <line x1="340" y1="6" x2="360" y2="6" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="366" y="11" fill="#6b7280" font-size="11">数据流向</text>
  </g>
</svg>