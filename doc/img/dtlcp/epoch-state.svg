<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" width="960" height="280">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <filter id="shadow" x="-3%" y="-5%" width="106%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="960" height="280" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">Epoch 状态转换</text>

  <!-- Epoch 0 -->
  <rect x="50" y="70" width="220" height="90" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="100" text-anchor="middle" fill="#1d4ed8" font-size="16" font-weight="600">epoch = 0</text>
  <text x="160" y="122" text-anchor="middle" fill="#6b7280" font-size="12">seq_num: 0, 1, 2, … n</text>
  <text x="160" y="142" text-anchor="middle" fill="#6b7280" font-size="11">明文传输（握手阶段）</text>

  <!-- Arrow 0→1 -->
  <line x1="275" y1="115" x2="345" y2="115" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="105" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">CCS</text>
  <text x="310" y="135" text-anchor="middle" fill="#6b7280" font-size="10">ChangeCipherSpec</text>

  <!-- Epoch 1 -->
  <rect x="370" y="70" width="220" height="90" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="100" text-anchor="middle" fill="#15803d" font-size="16" font-weight="600">epoch = 1</text>
  <text x="480" y="122" text-anchor="middle" fill="#6b7280" font-size="12">seq_num: 0, 1, 2, … m (独立计数)</text>
  <text x="480" y="142" text-anchor="middle" fill="#6b7280" font-size="11">密文传输（应用数据）</text>

  <!-- Arrow 1→2 -->
  <line x1="595" y1="115" x2="665" y2="115" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="105" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">CCS</text>
  <text x="630" y="135" text-anchor="middle" fill="#6b7280" font-size="10">重新握手</text>

  <!-- Epoch 2 -->
  <rect x="690" y="70" width="220" height="90" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="100" text-anchor="middle" fill="#7c3aed" font-size="16" font-weight="600">epoch = 2</text>
  <text x="800" y="122" text-anchor="middle" fill="#6b7280" font-size="12">seq_num: 0, 1, 2, … k (独立计数)</text>
  <text x="800" y="142" text-anchor="middle" fill="#6b7280" font-size="11">更新密钥后的密文传输</text>

  <!-- Rules note -->
  <g transform="translate(30, 200)">
    <text x="0" y="0" fill="#111827" font-size="13" font-weight="600">关键规则：</text>
    <text x="0" y="22" fill="#6b7280" font-size="12">• 每次 CCS 后 epoch 递增，seq_num 归零</text>
    <text x="0" y="42" fill="#6b7280" font-size="12">• epoch/seq_num 对必须唯一，2×MSL 时间内不得重用</text>
    <text x="0" y="62" fill="#6b7280" font-size="12">• 序列号回绕前必须终止连接并重新握手</text>
  </g>
</svg>