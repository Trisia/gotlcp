<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <filter id="shadow" x="-2%" y="-3%" width="104%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="960" height="420" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">记录层报文结构对比</text>

  <!-- TLCP Record Layer -->
  <text x="200" y="65" text-anchor="middle" fill="#1d4ed8" font-size="15" font-weight="600">TLCP 记录层 (5 字节)</text>

  <!-- TLCP Header blocks -->
  <rect x="30" y="85" width="70" height="55" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="65" y="108" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">Type</text>
  <text x="65" y="128" text-anchor="middle" fill="#6b7280" font-size="11">1B</text>

  <rect x="100" y="85" width="110" height="55" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="108" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">Version</text>
  <text x="155" y="128" text-anchor="middle" fill="#6b7280" font-size="11">2B</text>

  <rect x="210" y="85" width="110" height="55" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="265" y="108" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">Length</text>
  <text x="265" y="128" text-anchor="middle" fill="#6b7280" font-size="11">2B</text>

  <rect x="320" y="85" width="200" height="55" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="420" y="108" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">Fragment (负载)</text>
  <text x="420" y="128" text-anchor="middle" fill="#6b7280" font-size="11">可变长度</text>

  <!-- Size annotation -->
  <line x1="30" y1="155" x2="520" y2="155" stroke="#6b7280" stroke-width="1"/>
  <line x1="30" y1="150" x2="30" y2="160" stroke="#6b7280" stroke-width="1"/>
  <line x1="520" y1="150" x2="520" y2="160" stroke="#6b7280" stroke-width="1"/>
  <text x="275" y="172" text-anchor="middle" fill="#6b7280" font-size="12">总头部: 3B (TLCP 原有) + 负载</text>

  <!-- DTLCP Record Layer -->
  <text x="520" y="65" text-anchor="middle" fill="#15803d" font-size="15" font-weight="600">DTLCP 记录层 (13 字节)</text>

  <!-- DTLCP Header blocks -->
  <rect x="30" y="200" width="70" height="55" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="65" y="223" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">Type</text>
  <text x="65" y="243" text-anchor="middle" fill="#6b7280" font-size="11">1B</text>

  <rect x="100" y="200" width="110" height="55" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="223" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">Version</text>
  <text x="155" y="243" text-anchor="middle" fill="#6b7280" font-size="11">2B</text>

  <!-- New fields highlight -->
  <rect x="210" y="200" width="110" height="55" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="223" text-anchor="middle" fill="#92400e" font-size="13" font-weight="600">Epoch</text>
  <text x="265" y="243" text-anchor="middle" fill="#6b7280" font-size="11">2B · 新增</text>

  <rect x="320" y="200" width="200" height="55" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="223" text-anchor="middle" fill="#92400e" font-size="13" font-weight="600">SequenceNumber</text>
  <text x="420" y="243" text-anchor="middle" fill="#6b7280" font-size="11">6B (48位) · 新增</text>

  <rect x="520" y="200" width="110" height="55" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="575" y="223" text-anchor="middle" fill="#166534" font-size="13" font-weight="600">Length</text>
  <text x="575" y="243" text-anchor="middle" fill="#6b7280" font-size="11">2B</text>

  <rect x="630" y="200" width="200" height="55" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="730" y="223" text-anchor="middle" fill="#15803d" font-size="13" font-weight="600">Fragment (负载)</text>
  <text x="730" y="243" text-anchor="middle" fill="#6b7280" font-size="11">可变长度</text>

  <!-- Size annotation for DTLCP -->
  <line x1="30" y1="270" x2="830" y2="270" stroke="#6b7280" stroke-width="1"/>
  <line x1="30" y1="265" x2="30" y2="275" stroke="#6b7280" stroke-width="1"/>
  <line x1="830" y1="265" x2="830" y2="275" stroke="#6b7280" stroke-width="1"/>
  <text x="430" y="287" text-anchor="middle" fill="#6b7280" font-size="12">TLCP 原有 3B + DTLCP 新增 8B = 总头部 11B + 负载</text>

  <!-- DTLCP added fields bracket -->
  <line x1="205" y1="300" x2="525" y2="300" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="205" y1="295" x2="205" y2="305" stroke="#f59e0b" stroke-width="1"/>
  <line x1="525" y1="295" x2="525" y2="305" stroke="#f59e0b" stroke-width="1"/>
  <text x="365" y="318" text-anchor="middle" fill="#d97706" font-size="13" font-weight="600">◀── DTLCP 新增 (8B) ──▶</text>

  <!-- Legend -->
  <g transform="translate(30, 360)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="18" y="11" fill="#6b7280" font-size="11">TLCP 原有字段</text>
    <rect x="140" y="0" width="12" height="12" rx="2" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="158" y="11" fill="#6b7280" font-size="11">DTLCP 原有字段</text>
    <rect x="280" y="0" width="12" height="12" rx="2" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="298" y="11" fill="#6b7280" font-size="11">DTLCP 新增字段</text>
    <rect x="420" y="0" width="12" height="12" rx="2" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="438" y="11" fill="#6b7280" font-size="11">负载数据</text>
  </g>
</svg>