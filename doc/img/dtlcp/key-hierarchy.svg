<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">密钥层次结构</text>

  <!-- 服务端加密公钥 -->
  <rect x="320" y="55" width="320" height="50" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="86" text-anchor="middle" fill="#7c3aed" font-size="14" font-weight="600">服务端加密公钥</text>

  <line x1="480" y1="105" x2="480" y2="128" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="492" y="120" fill="#6b7280" font-size="11">加密 / 协商</text>

  <!-- 预主密钥 -->
  <rect x="320" y="133" width="320" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="164" text-anchor="middle" fill="#92400e" font-size="14" font-weight="600">预主密钥 (pre_master_secret)</text>

  <line x1="480" y1="183" x2="480" y2="206" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="492" y="198" fill="#6b7280" font-size="11">PRF("master secret", client_random + server_random)</text>

  <!-- 主密钥 -->
  <rect x="320" y="211" width="320" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="242" text-anchor="middle" fill="#92400e" font-size="14" font-weight="600">主密钥 (master_secret) · 48 字节</text>

  <line x1="480" y1="261" x2="480" y2="284" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="492" y="276" fill="#6b7280" font-size="11">PRF("key expansion", server_random + client_random)</text>

  <!-- 密钥块 -->
  <rect x="320" y="289" width="320" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="315" text-anchor="middle" fill="#15803d" font-size="14" font-weight="600">密钥块 (key_block)</text>

  <!-- 分叉到 3 个工作密钥 -->
  <line x1="480" y1="329" x2="480" y2="350" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="100" y1="350" x2="860" y2="350" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="100" y1="350" x2="100" y2="373" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="350" x2="480" y2="373" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="860" y1="350" x2="860" y2="373" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3 个工作密钥 -->
  <rect x="25" y="378" width="150" height="65" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="406" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">校验密钥</text>
  <text x="100" y="426" text-anchor="middle" fill="#6b7280" font-size="11">MAC key</text>
  <text x="100" y="440" text-anchor="middle" fill="#6b7280" font-size="10">HMAC-SM3 完整性校验</text>

  <rect x="405" y="378" width="150" height="65" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="406" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">加密密钥</text>
  <text x="480" y="426" text-anchor="middle" fill="#6b7280" font-size="11">enc key</text>
  <text x="480" y="440" text-anchor="middle" fill="#6b7280" font-size="10">SM4 数据加密</text>

  <rect x="785" y="378" width="150" height="65" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="860" y="406" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="600">初始向量</text>
  <text x="860" y="426" text-anchor="middle" fill="#6b7280" font-size="11">IV</text>
  <text x="860" y="440" text-anchor="middle" fill="#6b7280" font-size="10">加密初始向量</text>

  <text x="480" y="480" text-anchor="middle" fill="#6b7280" font-size="12">密钥块按顺序切分为 client_write 和 server_write 方向各一份</text>

  <!-- Legend -->
  <g transform="translate(30, 530)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
    <text x="18" y="11" fill="#6b7280" font-size="11">输入密钥</text>
    <rect x="100" y="0" width="12" height="12" rx="2" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="118" y="11" fill="#6b7280" font-size="11">派生密钥</text>
    <rect x="200" y="0" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="218" y="11" fill="#6b7280" font-size="11">中间产物</text>
    <rect x="300" y="0" width="12" height="12" rx="2" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="318" y="11" fill="#6b7280" font-size="11">工作密钥</text>
  </g>
</svg>