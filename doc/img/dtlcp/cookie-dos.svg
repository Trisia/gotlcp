<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="mc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="ms" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="ma" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="960" height="640" fill="#ffffff"/>
  <text x="480" y="22" text-anchor="middle" fill="#111827" font-size="17" font-weight="600">无状态 Cookie 防 DoS 攻击</text>

  <rect x="20" y="84" width="920" height="164" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="35" y="98" fill="#94a3b8" font-size="9" font-weight="600">正常握手 · Cookie 交换</text>
  <line x1="120" y1="129" x2="840" y2="129" stroke="#2563eb" stroke-width="1.2" marker-end="url(#mc)"/>
  <rect x="134" y="118" width="130" height="22" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="199" y="134" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">ClientHello</text>
  <text x="134" y="150" fill="#6b7280" font-size="9">cookie = 空</text>
  <line x1="840" y1="171" x2="120" y2="171" stroke="#16a34a" stroke-width="1.2" marker-end="url(#ms)"/>
  <rect x="626" y="160" width="200" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="726" y="176" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">HelloVerifyRequest</text>
  <text x="826" y="192" text-anchor="end" fill="#6b7280" font-size="9">HMAC-SM3 Cookie</text>
  <line x1="120" y1="213" x2="840" y2="213" stroke="#2563eb" stroke-width="1.2" marker-end="url(#mc)"/>
  <rect x="134" y="202" width="130" height="22" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="199" y="218" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">ClientHello</text>
  <text x="134" y="234" fill="#6b7280" font-size="9">携带 Cookie</text>
  <text x="55" y="244" fill="#15803d" font-size="8">④ 服务端重新计算 HMAC-SM3 比对 → 验证通过 → 分配连接资源 → 继续完整握手</text>
  <rect x="20" y="266" width="920" height="130" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="35" y="280" fill="#dc2626" font-size="9" font-weight="600">攻击场景 · 源 IP 伪造</text>
  <rect x="65" y="290" width="60" height="20" rx="4" fill="#dc2626"/>
  <text x="95" y="304" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Attacker</text>
  <line x1="120" y1="311" x2="840" y2="311" stroke="#dc2626" stroke-width="1.2" marker-end="url(#ma)"/>
  <rect x="134" y="300" width="130" height="22" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="199" y="316" text-anchor="middle" fill="#b91c1c" font-size="11" font-weight="600">ClientHello</text>
  <text x="134" y="332" fill="#6b7280" font-size="9">伪造源 IP = 受害者地址</text>
  <line x1="840" y1="353" x2="120" y2="353" stroke="#16a34a" stroke-width="1.2" marker-end="url(#ms)"/>
  <rect x="626" y="342" width="200" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="726" y="358" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">HelloVerifyRequest</text>
  <text x="826" y="374" text-anchor="end" fill="#6b7280" font-size="9">Cookie → 受害者, 攻击者收不到</text>
  <text x="480" y="390" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">✘ 攻击者无法获得 Cookie → 无法完成握手</text>
  <rect x="20" y="414" width="920" height="70" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="430" text-anchor="middle" fill="#15803d" font-size="10" font-weight="600">Cookie = HMAC-SM3(Secret, Client-IP + Client-Parameters)</text>
  <text x="480" y="448" text-anchor="middle" fill="#6b7280" font-size="9">Client-Parameters: version, random, session_id, cipher_suites, compression</text>
  <text x="480" y="466" text-anchor="middle" fill="#6b7280" font-size="9">Secret ≥ 16 字节 · 服务端不存储 Cookie · 收到后重新计算比对 · 全程无状态</text>
  <line x1="120" y1="44" x2="120" y2="499" stroke="#bfdbfe" stroke-width="1.2" stroke-dasharray="6,4"/>
  <rect x="90" y="44" width="60" height="26" rx="5" fill="#2563eb"/>
  <text x="120" y="62" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Client</text>
  <line x1="840" y1="44" x2="840" y2="499" stroke="#bbf7d0" stroke-width="1.2" stroke-dasharray="6,4"/>
  <rect x="810" y="44" width="60" height="26" rx="5" fill="#16a34a"/>
  <text x="840" y="62" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Server</text>
  <g transform="translate(30, 514)">
    <rect x="0" y="0" width="20" height="12" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
    <text x="24" y="10" fill="#6b7280" font-size="8">Client →</text>
    <rect x="90" y="0" width="20" height="12" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="0.5"/>
    <text x="114" y="10" fill="#6b7280" font-size="8">← Server</text>
    <rect x="180" y="0" width="20" height="12" rx="3" fill="#fecaca" stroke="#fca5a5" stroke-width="0.5"/>
    <text x="204" y="10" fill="#6b7280" font-size="8">Attacker →</text>
  </g>
</svg>